dataset_configs:
  desc: Ground Truth Dataset Configurations
  value:
    ground_truth_dataset_path: "./dataset/cylinder_Re20_groundtruth.parquet" # LOCAL
    # base_dataset_path: "/content/drive/MyDrive/Programming/dataset/" # GOOGLE COLAB
    num_collocation_points: 8000
    num_near_cylinder_points: 0
    near_cylinder_radius_factor: 4.0
    num_bc_points: 500
    num_noslip_points: 500
    num_ic_points: 300
    U_mean: 0.2
    domain_bounds:
      x_min: 0.0
      x_max: 2.2
      y_min: 0.0
      y_max: 0.41
      t_min: 0.0
      t_max: 10.0
    cylinder_geometry:
      cx: 0.2
      cy: 0.2
      r: 0.05
    steps_per_epoch: 100
    reynolds_number: 20
    nu: 0.001 # kinematic viscosity nu = U_mean * D / Re, where D=0.1m U_mean=0.2m/s Re=20

training_hyperparameters:
  desc: Training Hyperparameters
  value:
    batch_size: 1
    num_epochs: 2000
    learning_rate: 0.001

loss_weights:
  desc: Loss Weights for Different Components
  value:
    lambda_physics: 3.0
    lambda_bc: 5.0
    lambda_ic: 0.2

model_architecture_hyperparameters:
  desc: Model Architecture Hyperparameters
  value:
    hidden_layers: 8
    hidden_width: 128

experiment_details:
  desc: Experiment Details
  value:
    model_dir: "./trained_models/"
    experiment_name: "re20_baseline"
    use_wandb: True

wandb_config:
  desc: Weights and Biases Configuration
  value:
    project: "PINNs_Modeling"
    entity: "deveshshah-university-of-michigan"
    mode: "online"
    config: {}