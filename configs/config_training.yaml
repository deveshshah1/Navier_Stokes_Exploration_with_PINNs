dataset_configs:
  desc: Ground Truth Dataset Configurations
  value:
    base_dataset_path: "./dataset/" # LOCAL
    # base_dataset_path: "/content/drive/MyDrive/Programming/dataset/" # GOOGLE COLAB
    cylinder_Re20: "cylinder_Re20_groundtruth.parquet"
